app = "ipsos-qc-engine-dashboard"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8501"
  DB_PATH = "/data/qc_dashboard.db"

[mounts]
  source = "dashboard_data"
  destination = "/data"

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 20
    soft_limit = 15

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
