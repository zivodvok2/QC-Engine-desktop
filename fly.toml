app = "ipsos-qc-engine-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  # Set DATABASE_URL in `fly secrets set` to your Neon connection string:
  # fly secrets set DATABASE_URL="postgresql://user:pass@ep-xxx.region.aws.neon.tech/dbname?sslmode=require"
  # Set ALLOWED_ORIGINS to your Vercel URL (comma-separated for multiple)
  ALLOWED_ORIGINS = "*"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

# Free tier: shared-cpu-1x, 256 MB RAM
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
