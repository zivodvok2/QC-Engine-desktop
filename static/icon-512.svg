<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0b0c0f"/>
  <rect width="512" height="512" rx="96" fill="#111318"/>

  <!-- Serval ears (sharp, tall triangles) -->
  <polygon points="130,220 162,100 196,210" fill="#4af0a0"/>
  <polygon points="316,210 350,100 382,220" fill="#4af0a0"/>
  <!-- Inner ear -->
  <polygon points="144,210 162,134 180,206" fill="#111318"/>
  <polygon points="332,206 350,134 368,210" fill="#111318"/>

  <!-- Head -->
  <ellipse cx="256" cy="290" rx="140" ry="118" fill="none" stroke="#4af0a0" stroke-width="14"/>

  <!-- Eyes -->
  <ellipse cx="214" cy="262" rx="20" ry="24" fill="#4af0a0"/>
  <ellipse cx="298" cy="262" rx="20" ry="24" fill="#4af0a0"/>
  <!-- Pupils -->
  <ellipse cx="214" cy="262" rx="7" ry="16" fill="#111318"/>
  <ellipse cx="298" cy="262" rx="7" ry="16" fill="#111318"/>

  <!-- Nose bridge -->
  <line x1="256" y1="286" x2="256" y2="308" stroke="#4af0a0" stroke-width="6" stroke-linecap="round"/>

  <!-- Nose triangle -->
  <path d="M238 308 L256 326 L274 308 Z" fill="#4af0a0"/>

  <!-- Whisker dots -->
  <circle cx="196" cy="322" r="6" fill="#4af0a0" opacity="0.7"/>
  <circle cx="222" cy="332" r="6" fill="#4af0a0" opacity="0.7"/>
  <circle cx="290" cy="332" r="6" fill="#4af0a0" opacity="0.7"/>
  <circle cx="316" cy="322" r="6" fill="#4af0a0" opacity="0.7"/>

  <!-- Spots -->
  <ellipse cx="200" cy="374" rx="18" ry="12" fill="#4af0a0" opacity="0.3"/>
  <ellipse cx="256" cy="388" rx="18" ry="12" fill="#4af0a0" opacity="0.3"/>
  <ellipse cx="312" cy="374" rx="18" ry="12" fill="#4af0a0" opacity="0.3"/>

  <!-- SL wordmark -->
  <text x="256" y="472" text-anchor="middle"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900" font-size="52" letter-spacing="14"
        fill="#4af0a0">SL</text>
</svg>
